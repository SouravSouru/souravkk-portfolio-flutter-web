<!DOCTYPE html>
<html lang="en">

<head>
  <!-- Flutter engine config moved to flutter_bootstrap.js -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <!-- SEO Meta Tags -->
  <title>Sourav K K — Flutter Developer Portfolio</title>
  <meta name="description"
    content="Sourav K K — Senior Flutter Developer with 4+ years of experience crafting premium mobile, web and desktop apps. Specialized in Clean Architecture, Bloc, Riverpod & Firebase.">
  <meta name="keywords"
    content="Flutter Developer, Dart, Mobile Developer, Portfolio, Sourav K K, Flutter Web, Cross-Platform, Android iOS, Firebase, Clean Architecture">
  <meta name="author" content="Sourav K K">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Social Preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sourav K K — Flutter Developer Portfolio">
  <meta property="og:description"
    content="Senior Flutter Developer crafting premium cross-platform experiences with 4+ years of expertise.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta name="twitter:card" content="summary_large_image">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Sourav KK">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Theme Color (matches dark bg) -->
  <meta name="theme-color" content="#060A10">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico" />

  <!-- Google Fonts Preload -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      background-color: #060A10;
      margin: 0;
      padding: 0;
      height: 100%;
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Premium custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0D1117;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #4F46E5, #7C3AED);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #6366F1, #8B5CF6);
    }


    /* Flutter app container */
    flt-glass-pane {
      cursor: default;
    }

    /* Smooth cursor for interactive elements */
    a,
    button,
    [role="button"] {
      cursor: pointer;
    }
  </style>
  <style>
    /* ... existing CSS ... */

    /* Premium CSS Loader */
    .loader-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #060A10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      /* Crucial: places the loader below the Flutter application. */
      /* When Flutter completes its first paint, the Scaffold background naturally hides this. */
      z-index: -1;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid rgba(79, 70, 229, 0.15);
      border-top-color: #4F46E5;
      border-radius: 50%;
      animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      margin-top: 16px;
      color: #6B7280;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <!-- Native Web Loader (Instantly visible, no JS delay) -->
  <div class="loader-bg">
    <div class="spinner"></div>
    <div class="loader-text">Loading Experience</div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
